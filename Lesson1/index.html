<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Recipe explorer - part 1</title>
        <link rel="stylesheet" href="style.css">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    </head>
    
    <body>
        <div class="container py-4 app-wrapper">
            <h2 class="text-center mb-2 fw-bold">Recipe explorer</h2>
            <p class="text-center text-muted mb-4">
                Search for your favourite dishes.
            </p>
    
            <!-- Search bar -->
            <div class="input-group mb-3">
                <input id="searchInput" type="text" class="form-control"
                    placeholder="Type a dish name, e.g.,salad,cake..." />
                <button id="searchBtn" class="btn btn-primary">Search</button>
            </div>
    
            <!-- Status message -->
            <p id="message" class="text-center text-muted mb-3"></p>
    
            <!-- Results row -->
            <div id="results" class="row g-4 justify-content-center">
                <!-- cards will go here -->
            </div>
        </div>
    
        <div class="modal fade" id="recipeModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-lg modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Recipe details</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
    
                    <div class="modal-body" id="modalBody">
                        <!-- filled by JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    
        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
        <!-- App script -->
        <script src="script.js"></script>
        <script>
        </script>
    
    </body>
    
</html>
