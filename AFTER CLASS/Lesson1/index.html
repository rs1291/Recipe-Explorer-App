<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meal Finder with Category Filter</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            color: #222;
            line-height: 1.5;
            padding: 30px 15px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 30px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #1f2937;
        }

        .search-box {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            min-width: 240px;
            max-width: 500px;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        .search-box input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }

        .search-box button {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s ease;
        }

        .search-box button:hover {
            background: #1d4ed8;
        }

        .message {
            text-align: center;
            margin-bottom: 18px;
            font-weight: 600;
            color: #374151;
            min-height: 24px;
        }

        /* category filter bar */
        #categoryBar {
            text-align: center;
            margin-bottom: 24px;
        }

        .category-btn {
            margin: 6px;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid #9ca3af;
            background: white;
            color: #374151;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s ease;
        }

        .category-btn:hover {
            background: #f3f4f6;
        }

        .category-btn.active {
            background: #374151;
            color: white;
            border-color: #374151;
        }

        .results {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }

        .meal-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .meal-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1);
        }

        .meal-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }

        .meal-content {
            padding: 15px;
        }

        .meal-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #111827;
        }

        .meal-meta {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .meal-link {
            display: inline-block;
            text-decoration: none;
            background: #10b981;
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s ease;
        }

        .meal-link:hover {
            background: #059669;
        }

        .empty-state {
            text-align: center;
            padding: 30px 10px;
            color: #6b7280;
            grid-column: 1 / -1;
        }

        @media (max-width: 640px) {
            .container {
                padding: 20px;
            }

            .search-box {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box input,
            .search-box button {
                width: 100%;
                max-width: none;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Meal Finder</h1>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search meals like chicken, pasta, cake..." />
            <button id="searchBtn">Search</button>
        </div>

        <p class="message" id="message">Search for a meal to begin.</p>

        <!-- category filter bar -->
        <div id="categoryBar" class="mb-3 text-center">
            <!-- buttons will be added here by JavaScript -->
        </div>

        <div id="results" class="results"></div>
    </div>

    <script>
        const searchInput = document.getElementById("searchInput");
        const searchBtn = document.getElementById("searchBtn");
        const message = document.getElementById("message");
        const resultsContainer = document.getElementById("results");
        const categoryBar = document.getElementById("categoryBar");

        let allMeals = []; // will store the full list of meals from the last search

        function displayResults(meals) {
            resultsContainer.innerHTML = "";

            if (!meals || meals.length === 0) {
                resultsContainer.innerHTML = `
          <div class="empty-state">
            No meals to display.
          </div>
        `;
                return;
            }

            const cardsHtml = meals.map(function (meal) {
                return `
          <div class="meal-card">
            <img src="${meal.strMealThumb}" alt="${meal.strMeal}" />
            <div class="meal-content">
              <h3 class="meal-title">${meal.strMeal}</h3>
              <p class="meal-meta">
                Category: ${meal.strCategory || "N/A"}<br>
                Area: ${meal.strArea || "N/A"}
              </p>
              <a
                class="meal-link"
                href="${meal.strYoutube || '#'}"
                target="_blank"
                rel="noopener noreferrer"
              >
                Watch Recipe
              </a>
            </div>
          </div>
        `;
            }).join("");

            resultsContainer.innerHTML = cardsHtml;
        }

        function buildCategoryBar(meals) {
            if (!meals || meals.length === 0) {
                categoryBar.innerHTML = "";
                return;
            }

            const categories = [...new Set(
                meals
                    .map(function (meal) {
                        return meal.strCategory;
                    })
                    .filter(Boolean)
            )];

            const allCategories = ["All", ...categories];

            const buttonsHtml = allCategories.map(function (cat, index) {
                return `
          <button
            class="category-btn ${index === 0 ? "active" : ""}"
            data-category="${cat}"
          >
            ${cat}
          </button>
        `;
            }).join("");

            categoryBar.innerHTML = buttonsHtml;
        }

        function handleSearch() {
            const query = searchInput.value.trim();

            if (!query) {
                message.textContent = "Please enter a meal name.";
                resultsContainer.innerHTML = "";
                categoryBar.innerHTML = "";
                allMeals = [];
                return;
            }

            message.textContent = "Searching...";
            resultsContainer.innerHTML = "";
            categoryBar.innerHTML = "";

            fetch("https://www.themealdb.com/api/json/v1/1/search.php?s=" + encodeURIComponent(query))
                .then(function (response) {
                    return response.json();
                })
                .then(function (data) {
                    if (!data.meals) {
                        message.textContent = "No recipes found. Try another dish.";
                        resultsContainer.innerHTML = "";
                        document.getElementById("categoryBar").innerHTML = "";
                        allMeals = [];
                        return;
                    }

                    allMeals = data.meals; // save all meals from this search

                    message.textContent = "Found " + data.meals.length + " recipe(s).";
                    buildCategoryBar(allMeals);
                    displayResults(allMeals); // show all by default
                })
                .catch(function () {
                    message.textContent = "Something went wrong. Please try again.";
                    resultsContainer.innerHTML = "";
                    categoryBar.innerHTML = "";
                    allMeals = [];
                });
        }

        searchBtn.addEventListener("click", handleSearch);

        searchInput.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                handleSearch();
            }
        });

        // Filter meals when a category button is clicked
        document.addEventListener("click", function (event) {
            if (event.target.classList.contains("category-btn")) {
                const selectedCategory = event.target.getAttribute("data-category");

                // update button styles
                const allButtons = document.querySelectorAll(".category-btn");
                allButtons.forEach(function (btn) {
                    btn.classList.remove("active");
                });
                event.target.classList.add("active");

                // filter meals
                if (selectedCategory === "All") {
                    displayResults(allMeals);
                    message.textContent = "Showing all " + allMeals.length + " recipe(s).";
                } else {
                    const filtered = allMeals.filter(function (meal) {
                        return meal.strCategory === selectedCategory;
                    });

                    displayResults(filtered);
                    message.textContent =
                        "Showing " +
                        filtered.length +
                        " recipe(s) in category: " +
                        selectedCategory + ".";
                }
            }
        });
    </script>
</body>

</html>
